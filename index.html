    const Card = ({ children, style={}, accent }) => (

    const masks = {
      cnpj: v => v.replace(/\D/g,"").slice(0,14).replace(/^(\d{2})(\d)/,"$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/,"$1.$2.$3").replace(/\.(\d{3})(\d)/,".$1/$2").replace(/(\d{4})(\d)/,"$1-$2"),
      cpf: v => v.replace(/\D/g,"").slice(0,11).replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2"),
      money: v => { const n=v.replace(/\D/g,""); if(!n) return ""; return (parseInt(n,10)/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,"."); },
      int: v => v.replace(/\D/g,""),
      mes: v => { let s=v.replace(/[^A-Za-z0-9\/]/g,"").slice(0,8); if(s.length>3 && s[3]!=="/") s=s.slice(0,3)+"/"+s.slice(3); return s; }
    };
    const validators = {
      cnpj: { pattern: "\\d{2}\\.\\d{3}\\.\\d{3}/\\d{4}-\\d{2}", title: "Digite um CNPJ válido no formato 00.000.000/0001-00", invalid: "Informe um CNPJ válido (ex: 12.345.678/0001-90)." },
      cpf: { pattern: "\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}", title: "Digite um CPF válido no formato 000.000.000-00", invalid: "Informe um CPF válido (ex: 123.456.789-00)." },
      mes: { pattern: "[A-Za-zÀ-ÿ]{3}/\\d{4}", title: "Use o formato Mês/Ano (ex: Abr/2025)", invalid: "Informe o mês no formato Mês/Ano (ex: Abr/2025)." },
      email: { title: "Digite um e-mail válido (ex: nome@dominio.com)", invalid: "Informe um e-mail válido (ex: nome@dominio.com)." }
    };
    const Inp = ({ label, mask, validate, errorMsg, onChange, onBlur, ...props }) => {
      const [invalid, setInvalid] = React.useState(false);
      const [errText, setErrText] = React.useState('');
      const [showPass, setShowPass] = React.useState(false);
      const ref = React.useRef(null);
      const v = validate && validators[validate] ? validators[validate] : {};
      const doValidate = (t) => {
        if (!t) return;
        if (t.validity.valueMissing) t.setCustomValidity(errorMsg || 'Este campo é obrigatório.');
        else if (t.validity.typeMismatch && props.type==='email') t.setCustomValidity(v.invalid || 'Informe um e-mail válido.');
        else if (t.validity.patternMismatch) t.setCustomValidity(v.invalid || errorMsg || 'Formato inválido.');
        else if (t.validity.rangeUnderflow) t.setCustomValidity('O valor mínimo é ' + props.min + '.');
        else if (t.validity.rangeOverflow) t.setCustomValidity('O valor máximo é ' + props.max + '.');
        else if (t.validity.tooShort) t.setCustomValidity('Preencha com pelo menos ' + props.minLength + ' caracteres.');
        else if (t.validity.stepMismatch) t.setCustomValidity('Informe um valor numérico válido.');
        else t.setCustomValidity('');
        if (!t.validity.valid) {
          setInvalid(true);
          setErrText(t.validationMessage);
        } else {
          setInvalid(false);
          setErrText('');
        }
      };
      const handleChange = e => {
        if (mask && masks[mask]) e.target.value = masks[mask](e.target.value);
        e.target.setCustomValidity('');
        setInvalid(false);
        setErrText('');
        if (onChange) onChange(e);
      };
      const handleInvalid = e => {
        doValidate(e.target);
        e.preventDefault();
      };
      const handleBlur = e => {
        if (props.required || props.minLength || props.pattern || validate) {
          doValidate(e.target);
        }
        if (onBlur) onBlur(e);
      };
      const isPassword = props.type === 'password';
      const inputType = isPassword && showPass ? 'text' : (props.type || 'text');
      return (
        <div style={{marginBottom:12}}>
          {label && <div style={{fontSize:12,color:C.textMuted,marginBottom:4,fontWeight:500}}>
            {label}{props.required && <span style={{color:'#C0392B',marginLeft:2,fontWeight:700}}>*</span>}
          </div>}
          <div style={{position:'relative',display:'flex',alignItems:'center'}}>
            <input ref={ref} {...props} type={inputType} {...(v.pattern?{pattern:v.pattern}:{})} {...(v.title?{title:v.title}:(props.title?{}:{}))} onChange={handleChange} onInvalid={handleInvalid} onBlur={handleBlur} style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",paddingRight:isPassword?"38px":"12px",border:'1px solid ' + (invalid ? '#C0392B' : C.border),borderRadius:8,fontSize:14,fontFamily:"inherit",background:invalid ? '#FFF5F5' : C.white,color:C.black,outline:invalid?'2px solid #C0392B':undefined,outlineOffset:invalid?'-1px':undefined}}/>
            {isPassword && <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',right:8,background:'none',border:'none',cursor:'pointer',padding:'4px',color:C.textMuted,fontSize:16,lineHeight:1}} title={showPass?'Ocultar senha':'Mostrar senha'}>{showPass ? '🙈' : '👁️'}</button>}
          </div>
          {invalid && errText && <div style={{color:'#C0392B',fontSize:11,marginTop:3,fontWeight:500}}>{errText}</div>}
        </div>
      );
    };

    function AppMotorista({ db, setDB }) {

          if (error) { flash("E-mail ou senha inválidos. Verifique seus dados."); return; }
          // Buscar perfil do motorista
          const { data: perfil } = await supabase.from('motoristas').select('*').eq('id', data.user.id).maybeSingle();
          if (perfil) {

            setMot(m); setTela("app");

            // Usuário autenticado mas sem perfil - solicitar dados

        } catch (e) { flash("Erro de conexão: " + e.message); }

      /* LOGIN SOCIAL DESABILITADO - configurar em Supabase > Authentication > Providers

      // ===== LOGIN SOCIAL (Google / Apple) =====
      const loginSocial = async (provider) => {
        try {
          setCarregando(true);
          const { error } = await supabase.auth.signInWithOAuth({
            provider,
            options: { redirectTo: window.location.href }
          });
          if (error) flash("Erro ao iniciar login com " + (provider==='google'?'Google':'Apple') + ": " + error.message);
        } catch (e) { flash("Erro: " + e.message); }
        finally { setCarregando(false); }
      };
      */

      // ===== CADASTRO (novo motorista) =====
      const cadastrar = async () => {
        try {
          setCarregando(true);
          // 1. Criar conta Supabase Auth
          const { data: authData, error: signupError } = await supabase.auth.signUp({ email: form.email, password: form.senha, options: { emailRedirectTo: null } });
          if (signupError) { flash("Erro ao criar conta: " + signupError.message); return; }
          // 2. Salvar perfil na tabela motoristas
          const { error: profileError } = await supabase.from('motoristas').insert([{
            id: authData.user.id,
            cnpj: form.cnpj,
            empresa: form.empresa,
            cidade: form.cidade,
            escola: form.escola,
            vagas_total: parseInt(form.vagasTotal)||0,
            vagas: parseInt(form.vagasTotal)||0,

          flash("Cadastro realizado com sucesso! Faça login para continuar.");

      const completarPerfil = async () => {

      const flash = m => { setMsg(m); setTimeout(()=>setMsg(""),2800); };

      // ===== LOGIN (email + senha) =====
      const login = async () => {
        try {
          setCarregando(true);
          const { data, error } = await supabase.auth.signInWithPassword({ email: loginForm.email, password: loginForm.senha });
          if (error) { flash("E-mail ou senha inválidos. Verifique seus dados."); return; }
          // Buscar perfil do pai
          const { data: perfil } = await supabase.from('pais').select('*').eq('id', data.user.id).maybeSingle();
          if (perfil) {
            setPai({ id: perfil.id, cpf: perfil.cpf, nome: perfil.nome, email: data.user.email });
            setTela("app");
          } else {
            // Usuário autenticado mas sem perfil - solicitar dados complementares
            setTela("completar");
          }
        } catch (e) { flash("Erro de conexão: " + e.message); }
        finally { setCarregando(false); }
      };
      /* LOGIN SOCIAL DESABILITADO - configurar em Supabase > Authentication > Providers

      // ===== LOGIN SOCIAL (Google / Apple) =====
      const loginSocial = async (provider) => {
        try {
          setCarregando(true);
          const { error } = await supabase.auth.signInWithOAuth({
            provider,
            options: { redirectTo: window.location.href }
          });
          if (error) flash("Erro ao iniciar login com " + (provider==='google'?'Google':'Apple') + ": " + error.message);
        } catch (e) { flash("Erro: " + e.message); }
        finally { setCarregando(false); }
      };
      */

      // ===== CADASTRO (novo pai/responsável) =====
      const cadastrar = async () => {
        try {
          setCarregando(true);
          // Regra: 1 email por CPF — verificar se CPF já existe
          const { data: cpfExiste } = await supabase.from('pais').select('id').eq('cpf', form.cpf).maybeSingle();
          if (cpfExiste) { flash("Este CPF já possui um cadastro. Faça login com o e-mail vinculado."); return; }
          // Criar conta Supabase Auth
          const { data: authData, error: signupError } = await supabase.auth.signUp({ email: form.email, password: form.senha, options: { emailRedirectTo: null } });
          if (signupError) { flash("Erro ao criar conta: " + signupError.message); return; }
          // Salvar perfil na tabela pais
          const { error: profileError } = await supabase.from('pais').insert([{
            id: authData.user.id,
            cpf: form.cpf,
            nome: form.nome
          }]);
          if (profileError) { flash("Erro ao salvar perfil: " + profileError.message); return; }
          flash("Cadastro realizado com sucesso! Faça login para continuar.");
          setTela("login");
        } catch (e) { flash("Erro: " + e.message); }
        finally { setCarregando(false); }
      };

      // ===== COMPLETAR PERFIL (após login social) =====
      const completarPerfil = async () => {
        try {
          setCarregando(true);
          const { data: { user } } = await supabase.auth.getUser();
          if (!user) { flash("Sessão expirada. Faça login novamente."); setTela("login"); return; }
          // Regra: 1 email por CPF
          const { data: cpfExiste } = await supabase.from('pais').select('id').eq('cpf', form.cpf).maybeSingle();
          if (cpfExiste) { flash("Este CPF já possui um cadastro vinculado a outro e-mail."); return; }
          const { error } = await supabase.from('pais').insert([{
            id: user.id,
            cpf: form.cpf,
            nome: form.nome
          }]);
          if (error) { flash("Erro ao salvar perfil: " + error.message); return; }
          setPai({ id: user.id, cpf: form.cpf, nome: form.nome, email: user.email });
          setTela("app");
        } catch (e) { flash("Erro: " + e.message); }
        finally { setCarregando(false); }
      };

      // ===== TELA: LOGIN =====
      if (tela==="login") return (
        <form style={{maxWidth:400,margin:"0 auto",padding:"32px 20px"}} onSubmit={e=>{e.preventDefault(); const f=e.currentTarget; if(!f.checkValidity()){[...f.querySelectorAll("input,select")].forEach(i=>{if(!i.validity.valid)i.dispatchEvent(new Event("invalid",{bubbles:false,cancelable:true}));}); return;} login();}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <Logo size={48}/>
            <p style={{color:C.textMuted,fontSize:14,marginTop:8}}>Encontre a van ideal para seu filho</p>
          </div>
          <Flash text={msg}/>
          <Inp label="E-mail" type="email" required maxLength={120} placeholder="seunome@exemplo.com" errorMsg="Informe um e-mail válido." value={loginForm.email} onChange={e=>setLoginForm({...loginForm,email:e.target.value})}/>
          <Inp label="Senha" type="password" required minLength={8} maxLength={60} errorMsg="A senha deve ter no mínimo 8 caracteres." value={loginForm.senha} onChange={e=>setLoginForm({...loginForm,senha:e.target.value})}/>
          <Btn full type="submit" disabled={carregando}>{carregando?"Entrando...":"Entrar"}</Btn>
          {/* LOGIN SOCIAL DESABILITADO
          <div style={{margin:"20px 0",display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1,height:1,background:C.border}}/>
            <span style={{fontSize:12,color:C.textMuted}}>ou continue com</span>
            <div style={{flex:1,height:1,background:C.border}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button type="button" onClick={()=>loginSocial('google')} disabled={carregando} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"10px 16px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:500}}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.7-6.7C35.5 2.4 30.1 0 24 0 14.8 0 7 5.4 3.1 13.3l7.8 6C12.7 13.5 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9C43.8 37.4 46.5 31.4 46.5 24.5z"/><path fill="#FBBC05" d="M10.9 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.6 2.6 10.8l8.3-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.6-5.9c-2 1.4-4.6 2.2-7.4 2.2-6.1 0-11.3-4-13.1-9.4l-8.3 6.1C7 42.6 14.8 48 24 48z"/></svg>
              Continuar com Google
            </button>
            <button type="button" onClick={()=>loginSocial('apple')} disabled={carregando} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"10px 16px",border:`1px solid ${C.border}`,borderRadius:10,background:"#000",color:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:500}}>
              <svg width="16" height="18" viewBox="0 0 814 1000"><path fill="#fff" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-167.3-107.2-132.5-170.5-132.5-312.1c0-194.3 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg>
              Continuar com Apple
            </button>
          </div>
          */}
          <div style={{marginTop:20,textAlign:"center",fontSize:13,color:C.textMuted}}>
            Não tem conta?{" "}
            <span onClick={()=>setTela("cadastro")} style={{color:C.black,fontWeight:700,cursor:"pointer",textDecoration:"underline"}}>Criar uma conta</span>
          </div>
        </form>
      );

      // ===== TELA: CADASTRO =====
      if (tela==="cadastro") return (
        <form style={{maxWidth:420,margin:"0 auto",padding:"32px 20px"}} onSubmit={e=>{e.preventDefault(); const f=e.currentTarget; if(!f.checkValidity()){[...f.querySelectorAll("input,select")].forEach(i=>{if(!i.validity.valid)i.dispatchEvent(new Event("invalid",{bubbles:false,cancelable:true}));}); return;} cadastrar();}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <Logo size={44}/>
            <p style={{color:C.textMuted,fontSize:14,marginTop:8}}>Criar conta — Pai/Responsável</p>
          </div>
          <Flash text={msg}/>
          <Inp label="CPF" placeholder="000.000.000-00" mask="cpf" validate="cpf" required errorMsg="Informe o seu CPF." value={form.cpf} onChange={e=>setForm({...form,cpf:e.target.value})}/>
          <Inp label="Nome completo" required minLength={2} maxLength={80} errorMsg="Informe o nome completo." value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>
          <Inp label="E-mail" type="email" required maxLength={120} placeholder="seunome@exemplo.com" errorMsg="Informe um e-mail válido." value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <Inp label="Senha" type="password" required minLength={8} maxLength={60} errorMsg="A senha deve ter no mínimo 8 caracteres." value={form.senha} onChange={e=>setForm({...form,senha:e.target.value})}/>
          <div style={{marginBottom:16,padding:"10px 12px",background:"#FFF9E6",border:"1px solid #F5D87A",borderRadius:8,fontSize:12,color:"#7A5C00"}}>
            ⚠️ Apenas 1 conta por CPF é permitida.
          </div>
          <Btn full type="submit" disabled={carregando}>{carregando?"Cadastrando...":"Criar conta"}</Btn>
          <div style={{marginTop:16,textAlign:"center",fontSize:13,color:C.textMuted}}>
            Já tem conta?{" "}
            <span onClick={()=>setTela("login")} style={{color:C.black,fontWeight:700,cursor:"pointer",textDecoration:"underline"}}>Fazer login</span>
          </div>
        </form>
      );

      // ===== TELA: COMPLETAR PERFIL (após login social) =====
      if (tela==="completar") return (
        <form style={{maxWidth:420,margin:"0 auto",padding:"32px 20px"}} onSubmit={e=>{e.preventDefault(); const f=e.currentTarget; if(!f.checkValidity()){[...f.querySelectorAll("input,select")].forEach(i=>{if(!i.validity.valid)i.dispatchEvent(new Event("invalid",{bubbles:false,cancelable:true}));}); return;} completarPerfil();}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <Logo size={44}/>
            <p style={{color:C.textMuted,fontSize:14,marginTop:8}}>Complete seu cadastro</p>
          </div>
          <Flash text={msg}/>
          <Inp label="CPF" placeholder="000.000.000-00" mask="cpf" validate="cpf" required errorMsg="Informe o seu CPF." value={form.cpf} onChange={e=>setForm({...form,cpf:e.target.value})}/>
          <Inp label="Nome completo" required minLength={2} maxLength={80} errorMsg="Informe o nome completo." value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})}/>
          <div style={{marginBottom:16,padding:"10px 12px",background:"#FFF9E6",border:"1px solid #F5D87A",borderRadius:8,fontSize:12,color:"#7A5C00"}}>
            ⚠️ Apenas 1 conta por CPF é permitida.
          </div>
          <Btn full type="submit" disabled={carregando}>{carregando?"Salvando...":"Continuar"}</Btn>
        </form>
      );

      const navItems=[{id:"buscar",label:"Buscar vans"},{id:"avaliar",label:"Avaliar motorista"},{id:"solicitar",label:"Solicitar vaga"},{id:"minhas",label:"Minhas solicitações"}];

      if (!pai) return null;

      return (
        <div>
          <div style={{background:C.black,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <Logo size={26} dark/>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:13,color:"#aaa"}}>{pai.nome}</span>
              <Btn variant="ghost" small onClick={()=>{setTela("login");setPai(null);}}>Sair</Btn>
            </div>
          </div>
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 20px"}}>
            <NavTab items={navItems} active={sub} onChange={setSub}/>
          </div>
          <div style={{padding:20,background:C.bg,minHeight:400}}>
            <Flash text={msg}/>

            {sub==="buscar"&&(
              <div>
                <Card>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <Inp label="Escola" placeholder="Nome da escola" maxLength={80} value={busca.escola} onChange={e=>setBusca({...busca,escola:e.target.value})}/>
                    <Inp label="Cidade" maxLength={60} value={busca.cidade} onChange={e=>setBusca({...busca,cidade:e.target.value})}/>
                  </div>
                </Card>
                <Sec title={`${resultados.length} van(s) encontrada(s)`}/>
                {resultados.map(m=>{
                  const avals=db.avaliacoes.filter(a=>a.motoristaId===m.id);
                  const media=avals.length?avals.reduce((s,a)=>s+a.nota,0)/avals.length:0;
                  return <Card key={m.id}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:15}}>{m.empresa}</div>
                        <div style={{fontSize:13,color:C.textMuted}}>{m.escola}</div>
                        <div style={{fontSize:13,color:C.textMuted}}>{m.cidade}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontWeight:700,fontSize:16}}>R$ {m.valor}<span style={{fontSize:12,fontWeight:400,color:C.textMuted}}>/mês</span></div>
                        {avals.length>0?<Stars value={media} size={14}/>:<span style={{fontSize:11,color:C.textMuted}}>sem avaliações</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:avals.length?10:0}}>
                      <Badge type={m.vagas>0?"yellow":"danger"}>{m.vagas>0?`${m.vagas} vagas`:"sem vagas"}</Badge>
                      {avals.length>0&&<Badge type="gray">{media.toFixed(1)} ★ · {avals.length} aval.</Badge>}
                    </div>
                    {avals.length>0&&(
                      <div style={{borderTop:`0.5px solid ${C.border}`,paddingTop:8}}>
                        {avals.slice(-2).map((a,i)=>{
                          const p=db.pais.find(x=>x.id===a.paiId);
                          return <div key={i} style={{fontSize:13,marginBottom:4,color:C.textMuted}}><strong style={{color:C.black}}>{p?.nome||"Pai/Mãe"}:</strong> {a.comentario}</div>;
                        })}
                      </div>
                    )}
                  </Card>;
                })}
              </div>
            )}

            {sub==="avaliar"&&(
              <Card>
                <Sec title="Avaliar motorista"/>
                <Sel label="Motorista" value={af.motoristaId} onChange={e=>setAf({...af,motoristaId:e.target.value})}>
                  <option value="">Selecione...</option>
                  {db.motoristas.map(m=><option key={m.id} value={m.id}>{m.empresa} — {m.escola}</option>)}
                </Sel>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:C.textMuted,marginBottom:8,fontWeight:500}}>Nota</div>
                  <Stars value={af.nota} onChange={n=>setAf({...af,nota:n})} size={32}/>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontWeight:500}}>Comentário</div>
                  <textarea value={af.comentario} onChange={e=>setAf({...af,comentario:e.target.value})} rows={3}
                    style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",background:C.white,color:C.black}}/>
                </div>
                <Btn full onClick={enviarAval}>Enviar avaliação</Btn>
              </Card>
            )}

            {sub==="solicitar"&&(
              <Card>
                <Sec title="Solicitar vaga"/>
                <Sel label="Motoristas com vagas disponíveis" value={sf.motoristaId} onChange={e=>setSf({...sf,motoristaId:e.target.value})}>
                  <option value="">Selecione...</option>
                  {db.motoristas.filter(m=>m.vagas>0).map(m=><option key={m.id} value={m.id}>{m.empresa} — {m.escola} ({m.vagas} vagas)</option>)}
                </Sel>
                {sf.motoristaId&&(()=>{const m=db.motoristas.find(x=>x.id===sf.motoristaId);return m?(
                  <div style={{background:"#F5F3EE",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
                    <div style={{fontWeight:700}}>{m.empresa}</div>
                    <div style={{fontSize:13,color:C.textMuted}}>{m.escola} · {m.cidade}</div>
                    <div style={{fontSize:13,marginTop:4}}>R$ {m.valor}/mês · <span style={{color:"#27500A",fontWeight:500}}>{m.vagas} vagas disponíveis</span></div>
                  </div>
                ):null;})()}
                <Btn full onClick={enviarSol}>Enviar solicitação</Btn>
              </Card>
            )}

            {sub==="minhas"&&(
              <div>
                <Sec title="Minhas solicitações"/>
                {minhasSol.length===0&&<p style={{color:C.textMuted,fontSize:14}}>Nenhuma solicitação enviada.</p>}
                {minhasSol.map((s,i)=>{
                  const m=db.motoristas.find(x=>x.id===s.motoristaId);
                  return <Card key={i}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:700}}>{m?.empresa}</div>
                        <div style={{fontSize:13,color:C.textMuted}}>{m?.escola}</div>
                        <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{s.data}</div>
                      </div>
                      <Badge type={s.status==="pendente"?"warning":s.status==="aceito"?"success":"danger"}>{s.status}</Badge>
                    </div>
                  </Card>;
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [modo,setModo] = useState(() => localStorage.getItem('vanpass_modo') || null);
      const [db,setDB] = useState(loadDB);
      const { useEffect } = React;

      useEffect(() => {
        // Restaurar sessão ao recarregar página
        const savedModo = localStorage.getItem('vanpass_modo');
        if (savedModo && !modo) {
          supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) { setModo(savedModo); }
            else { localStorage.removeItem('vanpass_modo'); setModo(null); }
          });
        }
      }, []);

      const handleSetModo = (m) => { if (m) localStorage.setItem('vanpass_modo', m); else localStorage.removeItem('vanpass_modo'); setModo(m); };

      if (!modo) return (
        <div style={{minHeight:"100vh",background:C.black,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,gap:32}}>
          <Logo size={56} dark/>
          <p style={{color:"#666",fontSize:14,margin:0,textAlign:"center"}}>Selecione o seu perfil para continuar</p>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
            <div onClick={()=>handleSetModo("motorista")} style={{background:"#111",border:`2px solid ${C.yellow}`,borderRadius:16,padding:"28px 32px",cursor:"pointer",textAlign:"center",minWidth:160}}>
              <div style={{fontSize:36,marginBottom:10}}>🚐</div>
              <div style={{color:C.yellow,fontWeight:800,fontSize:16,letterSpacing:-0.5}}>Sou motorista</div>
              <div style={{color:"#666",fontSize:12,marginTop:4}}>Gerenciar contratos e comunidade</div>
            </div>
            <div onClick={()=>handleSetModo("pais")} style={{background:"#111",border:`1px solid #333`,borderRadius:16,padding:"28px 32px",cursor:"pointer",textAlign:"center",minWidth:160}}>
              <div style={{fontSize:36,marginBottom:10}}>👨‍👩‍👧</div>
              <div style={{color:C.white,fontWeight:800,fontSize:16,letterSpacing:-0.5}}>Sou pai/mãe</div>
              <div style={{color:"#666",fontSize:12,marginTop:4}}>Buscar vans e solicitar vagas</div>
            </div>
          </div>
        </div>
      );

      return (
        <div style={{fontFamily:"system-ui,sans-serif",maxWidth:680,margin:"0 auto",background:C.white,minHeight:"100vh"}}>
          {modo==="motorista"?<AppMotorista db={db} setDB={setDB}/>:<AppPais db={db} setDB={setDB}/>}
          <div style={{background:C.black,padding:"10px 20px",display:"flex",justifyContent:"center"}}>
            <button onClick={()=>handleSetModo(null)} style={{background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>← Trocar perfil</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
